<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід / Реєстрація</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Головна</a>
            <a href="contacts.html">Контакти</a>
            <a href="sign-in.html">Вхід</a>
            <a href="dashboard.html">Журнал</a>
            <a href="admin.html">Адмінка</a>
        </nav>
    </header>
    <main>
        <h1 id="form-title">Авторизація (Вхід)</h1>
        
        <div id="auth-status"></div>

        <form id="auth-form">
            <label for="email" style="color: #94a3b8; margin-bottom: 5px;">Електронна пошта:</label>
            <input type="email" id="email" placeholder="example@domain.com" required>
            
            <label for="password" style="color: #94a3b8; margin-bottom: 5px;">Пароль:</label>
            <input type="password" id="password" placeholder="Введіть ваш пароль" required>
            
            <button type="submit" id="submit-btn">Увійти</button>
            
            <a href="#" id="toggle-auth" style="color: #38bdf8; text-decoration: none; margin-top: 15px; font-size: 14px; text-align: center;">Немає акаунту? Зареєструватися</a>
        </form>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
